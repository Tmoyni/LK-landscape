<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manual Test</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        #garden-image {
            width: 100%;
            height: auto;
            display: block;
            max-height: 800px;
            object-fit: contain;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Manual Test with Debug</h1>
        <img src="garden-plan.webp" alt="Garden Plan" id="garden-image">
    </div>

    <script>
        const ORIGINAL_WIDTH = 1500;
        const ORIGINAL_HEIGHT = 1034;

        const zones = {
            'test-zone': {
                coords: [394,755,1023,750,1091,822,478,818,394,754],
                name: 'test zone'
            },
            'test-2': {
                coords: [116,331,170,361,179,495,196,532,188,565,159,688,114,721,116,333],
                name: 'test 2'
            }
        };

        function getScaledPoint(clientX, clientY, img) {
            const rect = img.getBoundingClientRect();
            const x = clientX - rect.left;
            const y = clientY - rect.top;
            const scaleX = ORIGINAL_WIDTH / rect.width;
            const scaleY = ORIGINAL_HEIGHT / rect.height;
            return {
                x: x * scaleX,
                y: y * scaleY
            };
        }

        function isPointInPolygon(point, polygon) {
            let x = point.x, y = point.y;
            let inside = false;

            for (let i = 0, j = polygon.length - 2; i < polygon.length; i += 2) {
                let xi = polygon[i], yi = polygon[i + 1];
                let xj = polygon[j], yj = polygon[j + 1];

                let intersect = ((yi > y) !== (yj > y))
                    && (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
                if (intersect) inside = !inside;

                j = i;
            }

            return inside;
        }

        const gardenImage = document.getElementById('garden-image');

        gardenImage.addEventListener('click', (e) => {
            const point = getScaledPoint(e.clientX, e.clientY, gardenImage);

            // Create debug div
            const debugDiv = document.getElementById('debug-info') || (() => {
                const div = document.createElement('div');
                div.id = 'debug-info';
                div.style.cssText = 'position: fixed; top: 10px; right: 10px; background: #fff; border: 2px solid #000; padding: 10px; font-family: monospace; font-size: 12px; max-width: 300px; z-index: 10000;';
                document.body.appendChild(div);
                return div;
            })();

            debugDiv.innerHTML = `Click: (${Math.round(point.x)}, ${Math.round(point.y)})<br>Image: ${gardenImage.naturalWidth}x${gardenImage.naturalHeight}<br>Expected: ${ORIGINAL_WIDTH}x${ORIGINAL_HEIGHT}`;

            // Check zones
            let foundZone = null;
            for (const [zoneKey, zone] of Object.entries(zones)) {
                const isInside = isPointInPolygon(point, zone.coords);
                debugDiv.innerHTML += `<br>Zone '${zoneKey}': ${isInside ? 'YES ✓' : 'NO'}`;
                if (isInside) {
                    foundZone = zoneKey;
                }
            }

            if (foundZone) {
                debugDiv.innerHTML += `<br><br><strong style="color: green;">FOUND: ${foundZone}</strong>`;
                alert(`Zone clicked: ${foundZone}`);
            } else {
                debugDiv.innerHTML += `<br><br><strong style="color: red;">No zone detected</strong>`;
            }
        });
    </script>
</body>
</html>
