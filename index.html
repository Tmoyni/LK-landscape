<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Garden Landscape Plan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1 id="page-title">Loading...</h1>

        <!-- Leaflet map container -->
        <div id="map"></div>

        <!-- Zone list (primary navigation) — populated dynamically -->
        <nav class="zone-nav" id="zone-nav" aria-label="Garden zones"></nav>

        <!-- Popup panels — populated dynamically -->
        <div id="popups-container"></div>

        <!-- Mobile bottom sheet backdrop -->
        <div class="bottom-sheet-backdrop" id="backdrop"></div>

        <div class="instructions">
            <p><strong>How to use:</strong> Tap a zone on the map or click a zone name above to see plant details.</p>
            <p class="note">Click on any plant in the sidebar to see photos and more information!</p>
            <p class="note-small">Plant information and photos are loaded from the iNaturalist database.</p>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
